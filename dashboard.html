<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1b2d">
<title>TAGIN — 사장님 대시보드</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#00c9a7;--green2:#00b096;--green3:#e0faf6;
  --navy:#0f1b2d;--navy2:#1a2d45;--navy3:#243650;
  --gray1:#f4f6f9;--gray2:#e2e7ef;--gray3:#8a94a6;--gray4:#3d4a5c;
  --dark:#0f1b2d;--white:#fff;
  --red:#f04438;--orange:#f79009;--blue:#1565c0;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --radius:12px;
}
html,body{height:100%;}
body{font-family:'Inter','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--gray1);color:var(--dark);min-height:100vh;display:flex;justify-content:center;}

/* ── 앱 최대 너비 (PC 와이드 화면 대응) ── */
.app-wrap{display:flex;width:100%;max-width:1440px;min-height:100vh;position:relative;}

/* ── 사이드바 ── */
.sidebar{width:240px;background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
.side-head{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,.06);}
.side-head .logo{font-size:22px;font-weight:900;letter-spacing:2px;}
.side-head .logo span{color:var(--green);}
.side-head .biz{font-size:13px;color:rgba(255,255,255,.65);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trial-badge{display:none;margin:10px 22px 0;padding:6px 12px;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:16px;font-size:12px;font-weight:700;text-align:center;}
.trial-badge.active{display:block;}
.trial-badge.paid{background:linear-gradient(90deg,#00c9a7,#00b096);}
.trial-badge.expired{background:linear-gradient(90deg,#f04438,#d92d20);}

.nav-list{flex:1;padding:14px 0;overflow-y:auto;}
.nav-item{padding:11px 22px;font-size:14px;color:rgba(255,255,255,.72);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(0,201,167,.12);color:var(--green);font-weight:700;border-left-color:var(--green);}
.nav-item .ic{font-size:18px;flex-shrink:0;}

.side-foot{padding:14px 22px;border-top:1px solid rgba(255,255,255,.06);}
.owner-chip{display:flex;align-items:center;gap:8px;font-size:13px;}
.owner-chip .avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
.btn-logout{margin-top:10px;width:100%;padding:8px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-logout:hover{background:rgba(255,255,255,.12);color:#fff;}

/* ── 사이드바 모바일 오버레이 ── */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;}

/* ── 메인 영역 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:auto;min-width:0;}
.topbar{display:none;background:var(--white);border-bottom:1px solid var(--gray2);padding:12px 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.topbar .logo{font-size:16px;font-weight:900;letter-spacing:2px;}
.topbar .logo span{color:var(--green);}
.mobile-menu{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 6px;border-radius:6px;color:var(--dark);}
.mobile-menu:hover{background:var(--gray1);}

.view-root{padding:24px 28px;flex:1;}

/* ── 페이지 헤더 ── */
.page-head{margin-bottom:22px;}
.page-head h1{font-size:22px;font-weight:900;letter-spacing:-.3px;}
.page-head .page-sub{color:var(--gray3);font-size:13px;margin-top:5px;line-height:1.5;}

/* ── KPI 그리드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}
.kpi-card .kpi-label{font-size:11px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.kpi-card .kpi-val{font-size:30px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;}
.kpi-card .kpi-val.red{color:var(--red);}
.kpi-card .kpi-foot{font-size:11px;color:var(--gray3);margin-top:6px;}

/* ── 카드 ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.card .card-head{padding:16px 20px;border-bottom:1px solid var(--gray2);display:flex;flex-direction:column;gap:3px;}
.card .card-head h2{font-size:15px;font-weight:800;}
.card .card-head .card-sub{font-size:12px;color:var(--gray3);}

/* ── 테이블 ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-wrap::-webkit-scrollbar{height:3px;}
.table-wrap::-webkit-scrollbar-track{background:var(--gray1);}
.table-wrap::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:2px;}
.att-table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
.att-table th{background:var(--gray1);text-align:left;padding:10px 16px;font-weight:700;color:var(--gray4);border-bottom:1px solid var(--gray2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
.att-table td{padding:11px 16px;border-bottom:1px solid var(--gray2);vertical-align:middle;white-space:nowrap;}
.att-table tr:last-child td{border-bottom:none;}
.att-table tbody tr:hover{background:var(--gray1);}
.att-table .empty{text-align:center;color:var(--gray3);padding:40px 16px;white-space:normal;}
.att-table .pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.att-table .pill.green{background:var(--green3);color:var(--green2);}

/* ── 직원 테이블 편집 인풋 ── */
.cell-edit{padding:7px 9px;border:1.5px solid var(--gray2);border-radius:7px;font-size:12px;font-family:inherit;background:#fff;color:var(--dark);transition:.15s;}
.cell-edit:focus{border-color:var(--green);outline:none;box-shadow:0 0 0 2px rgba(0,201,167,.12);}
select.cell-edit{cursor:pointer;}

/* ── 필터 바 & 버튼 ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-bar input,.filter-bar select{padding:9px 12px;border:1.5px solid var(--gray2);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--dark);}
.btn{padding:9px 16px;border-radius:8px;border:1.5px solid var(--gray2);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--dark);transition:.15s;}
.btn:hover{background:var(--gray1);}
.btn.primary{background:linear-gradient(135deg,#00c9a7,#00b096);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,201,167,.28);}
.btn.primary:hover{filter:brightness(.95);}
.btn.danger{background:var(--red);color:#fff;border-color:transparent;}
.btn.ghost{background:transparent;}
.btn.small{padding:5px 11px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── 폼 ── */
.form-row{display:flex;gap:10px;padding:14px 20px;flex-wrap:wrap;align-items:center;}
.form-row input,.form-row select{flex:1;min-width:140px;padding:10px 12px;border:1.5px solid var(--gray2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--dark);}
.form-row input:focus,.form-row select:focus{border-color:var(--green);outline:none;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:18px 20px;}
.form-grid label{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:700;color:var(--gray4);}
.form-grid input,.form-grid select{padding:10px 12px;border:1.5px solid var(--gray2);border-radius:8px;font-size:14px;font-family:inherit;color:var(--dark);}
.form-grid input:focus,.form-grid select:focus{border-color:var(--green);outline:none;}
.form-actions{grid-column:1/-1;display:flex;justify-content:flex-end;}

/* ── 기타 ── */
.empty-state{padding:36px;text-align:center;color:var(--gray3);font-size:14px;}
.loading,.error-box{padding:60px;text-align:center;color:var(--gray3);}
.error-box{color:var(--red);}
.code{font-family:'Courier New',monospace;font-weight:800;color:var(--green);letter-spacing:2px;}
.muted{color:var(--gray3);font-size:12px;}
.badge-wage{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.wage-hourly{background:#e0faf6;color:#00a88a;}
.wage-daily{background:#fff3e0;color:#e65100;}
.wage-monthly{background:#e8eaf6;color:#3949ab;}

/* ── 토글 스위치 ── */
.switch{display:inline-block;position:relative;width:38px;height:22px;}
.switch input{opacity:0;width:0;height:0;}
.switch span{position:absolute;inset:0;background:var(--gray2);border-radius:22px;cursor:pointer;transition:.2s;}
.switch span::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch input:checked+span{background:var(--green);}
.switch input:checked+span::before{transform:translateX(16px);}

/* ── 매장 카드 ── */
.store-card{padding:0;}
.store-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--gray2);}
.store-head h3{font-size:15px;font-weight:800;}
.store-actions{display:flex;gap:6px;flex-wrap:wrap;}
.store-body{display:grid;grid-template-columns:220px 1fr;gap:20px;padding:18px 20px;}
.qr-block{display:flex;flex-direction:column;align-items:center;gap:8px;}
.qr-canvas{background:#fff;padding:8px;border-radius:8px;border:1px solid var(--gray2);}
.qr-caption{font-size:11px;color:var(--gray3);}
.store-info{font-size:13px;line-height:1.8;}
.store-info b{color:var(--gray4);}
.store-info code{font-family:'Courier New',monospace;font-size:11px;background:var(--gray1);padding:6px 8px;border-radius:6px;display:inline-block;margin-top:4px;word-break:break-all;white-space:normal;}

/* ── 시프트 ── */
.shift-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--green);border-radius:24px;margin:5px;background:#fff;font-size:13px;}
.shift-pill .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.shift-pill .pill.night{background:var(--navy);color:#fff;padding:2px 8px;border-radius:8px;font-size:10px;}
.grid-table th,.grid-table td{text-align:center;padding:8px 4px;}
.grid-cell{cursor:pointer;position:relative;min-width:88px;}
.grid-cell:hover{background:var(--green3);}
.shift-chip{display:inline-block;padding:4px 8px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:11px;line-height:1.3;}
.cell-picker{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#fff;border:1px solid var(--gray2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;min-width:180px;z-index:50;}
.picker-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;}
.picker-row:hover{background:var(--gray1);}
.picker-row .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

/* ── 매장 선택 카드 (시프트 캘린더) ── */
.store-pick-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:16px;}
.store-pick-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:24px 16px;background:#fff;border:1.5px solid var(--gray2);border-radius:12px;cursor:pointer;transition:.15s;font-family:inherit;}
.store-pick-card:hover{border-color:var(--green);background:var(--green3);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,201,167,.18);}
.store-pick-card .store-icon{font-size:36px;}
.store-pick-card strong{font-size:16px;color:var(--dark);}

/* ── 시프트 캘린더 (간트 차트형) ── */
.cal-scroll-wrap{overflow-x:auto;max-width:100%;}
.cal-grid{border-collapse:separate;border-spacing:0;font-size:11px;background:#fff;}
.cal-grid th{position:sticky;top:0;background:var(--gray1);padding:6px 4px;text-align:center;border-bottom:2px solid var(--gray2);min-width:36px;font-weight:700;color:var(--gray4);}
.cal-grid th.weekend{background:#fff3e0;color:#e65100;}
.cal-grid th .d-num{font-size:13px;font-weight:800;color:var(--dark);}
.cal-grid th .d-dow{font-size:10px;color:var(--gray3);}
.cal-grid th.weekend .d-dow{color:#e65100;}
.cal-grid td{padding:4px;border-bottom:1px solid var(--gray2);border-right:1px solid var(--gray2);text-align:center;vertical-align:middle;min-width:36px;height:42px;}
.cal-grid .emp-col{position:sticky;left:0;background:#fff;z-index:2;text-align:left;padding:8px 12px;min-width:120px;border-right:2px solid var(--gray2);}
.cal-grid th.emp-col{background:var(--gray1);z-index:3;}
.cal-cell{cursor:pointer;position:relative;}
.cal-cell:hover{background:var(--green3);}
.cal-shift{display:inline-block;padding:3px 6px;border-radius:6px;border:1.5px solid;font-weight:700;font-size:10px;line-height:1.2;}
.cal-off{display:inline-block;padding:3px 8px;border-radius:6px;background:#f0f1f5;color:#8a94a6;font-weight:700;font-size:10px;}
.cal-off-pill{display:inline-block;padding:3px 10px;border-radius:6px;background:#f0f1f5;color:#3d4a5c;font-weight:700;font-size:12px;}
.cal-empty{color:#dbe0e8;font-size:14px;}
.cal-picker{position:absolute;left:50%;top:100%;transform:translateX(-50%);background:#fff;border:1px solid var(--gray2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;min-width:200px;z-index:60;}

/* ── 급여 모달 (직원 월간 근무표) ── */
.pay-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.pay-modal-backdrop{position:absolute;inset:0;background:rgba(15,27,45,.62);backdrop-filter:blur(4px);}
.pay-modal-box{position:relative;background:#fff;border-radius:14px;max-width:880px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.pay-modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--gray2);}
.pay-modal-head h2{font-size:18px;font-weight:800;}
.pay-modal-close{background:none;border:none;font-size:20px;color:var(--gray3);cursor:pointer;padding:4px 10px;border-radius:6px;}
.pay-modal-close:hover{background:var(--gray1);color:var(--dark);}
.pay-modal-body{padding:18px 22px;overflow-y:auto;}
.pay-row{cursor:pointer;transition:.12s;}
.pay-row:hover{background:var(--green3);}
.cal-mini-summary{display:flex;gap:24px;padding:12px 16px;background:var(--gray1);border-radius:10px;margin-bottom:14px;font-size:14px;}
.cal-mini-summary strong{color:var(--dark);margin-left:6px;}
.cal-mini-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.cal-mini-head>div{text-align:center;font-size:12px;font-weight:700;color:var(--gray3);padding:6px 0;}
.cal-mini-head>div.sun{color:#f04438;}
.cal-mini-head>div.sat{color:#1565c0;}
.cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-mini-cell{min-height:80px;background:#fff;border:1.5px solid var(--gray2);border-radius:8px;padding:6px;font-size:11px;}
.cal-mini-cell.blank{background:var(--gray1);border-color:var(--gray1);}
.cal-mini-cell.worked{border-color:#00c9a7;background:rgba(0,201,167,.04);}
.cal-mini-cell .dnum{font-weight:800;color:var(--dark);margin-bottom:2px;font-size:13px;}
.cal-mini-cell .dnum.sun{color:#f04438;}
.cal-mini-cell .dnum.sat{color:#1565c0;}
.cal-mini-cell .m-sched{margin:2px 0;padding:2px 4px;border-radius:4px;border:1px solid;font-size:10px;font-weight:700;}
.cal-mini-cell .m-sched.off{background:#f0f1f5;color:#8a94a6;border-color:#dde1e8;}
.cal-mini-cell .m-att{margin-top:3px;padding:3px 4px;background:#e0faf6;border-radius:4px;font-size:10px;color:#00a88a;}
.cal-mini-cell .m-att .t-dur{font-weight:800;color:var(--dark);font-size:9px;}

/* ── 설정 구독 ── */
.sub-info{padding:16px 20px;}
.sub-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray2);font-size:14px;}
.sub-row:last-child{border-bottom:none;}
.sub-status.trialing{color:#7c3aed;}
.sub-status.active{color:var(--green);}
.sub-status.past_due,.sub-status.canceled{color:var(--red);}
.sub-cta{padding:16px 20px;border-top:1px solid var(--gray2);}

/* ════════════════════════════════
   반응형 — 태블릿 / 모바일
════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:100;}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 32px rgba(0,0,0,.3);}
  .sidebar-backdrop.active{display:block;}
  .topbar{display:flex;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .store-body{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .view-root{padding:16px;}
}

@media (max-width: 600px) {
  .kpi-grid{gap:10px;}
  .kpi-card{padding:14px 16px;}
  .kpi-card .kpi-val{font-size:26px;}
  .kpi-card .kpi-foot{display:none;}
  .page-head{margin-bottom:16px;}
  .page-head h1{font-size:18px;}
  .page-head .page-sub{font-size:12px;}
  .view-root{padding:12px 14px;}
  .card{margin-bottom:14px;border-radius:10px;}
  .card .card-head{padding:12px 14px;}
  .filter-bar{gap:6px;}
  .filter-bar input,.filter-bar select{font-size:12px;padding:8px 10px;}
  .btn{font-size:12px;padding:8px 13px;}
  .btn.small{padding:5px 9px;font-size:11px;}
  .att-table th{padding:9px 12px;font-size:10px;}
  .att-table td{padding:10px 12px;font-size:12px;}
  .form-row{padding:10px 14px;gap:8px;}
  .form-row input,.form-row select{min-width:120px;font-size:12px;}
  .store-head{flex-wrap:wrap;gap:8px;}
  .store-body{padding:14px;}
  .shift-pill{font-size:12px;padding:6px 10px;margin:4px;}
}

@media (max-width: 400px) {
  .kpi-card .kpi-val{font-size:22px;}
  .page-head h1{font-size:16px;}
}
</style>
</head>
<body>

<div class="app-wrap">
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<aside class="sidebar" id="sidebar">
  <div class="side-head">
    <div class="logo">TAG<span>IN</span></div>
    <div class="biz" id="biz-name">사업장</div>
  </div>
  <div class="trial-badge" id="trial-badge"></div>
  <nav class="nav-list">
    <button class="nav-item" data-route="overview"><span class="ic">📊</span>대시보드</button>
    <button class="nav-item" data-route="attendance"><span class="ic">🕒</span>근태 관리</button>
    <button class="nav-item" data-route="employees"><span class="ic">👥</span>직원 관리</button>
    <button class="nav-item" data-route="stores"><span class="ic">🏪</span>매장 / QR</button>
    <button class="nav-item" data-route="shifts"><span class="ic">📅</span>시프트</button>
    <button class="nav-item" data-route="payroll"><span class="ic">💰</span>급여</button>
    <button class="nav-item" data-route="settings"><span class="ic">⚙️</span>설정</button>
